<title>Singular Value Decomposition</title>

<desc>

Modified from the File
   http://commons.wikimedia.org/wiki/File:Singular-Value-Decomposition.svg
(the diagonal matrix and singular values are relabelled D and d_1, d_2
to match the notation used in the STAT 406 lecture notes).

Singular Value Decomposition of the 2-dimensional Shearing

M = ( 1 1 )
    ( 0 1 )

The Image shows:

Upper Left:
	The unit Disc with the two canonical unit Vectors

Upper Right:
	Unit Disc et al. transformed with M and singular Values
	d_1 and d_2 indicated

Lower Left:
	The Action of V^T on the Unit disc. This is a just
	Rotation.

Lower Right:
	The Action of D * V^T on the Unit disc. D scales in
	vertically and horizontally.

The this special Case the singularValues are Phi and 1/Phi where
Phi is the Golden Ratio. V^T is a (counter clockwise) Rotation by
an angle alpha where alpha satisfies tan(alpha) = -Phi.
U is a Rotation by beta with tan(beta) = Phi-1

</desc>

